<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analyze - NLP Legal Entity Extraction</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='analyze.css') }}">
</head>

<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">Legal NLP</div>
      <ul class="nav-menu">
        <li><a href="/" class="nav-link">Home</a></li>
        <li><a href="/analyze" class="nav-link active">Analyze</a></li>
        <li><a href="/about" class="nav-link">About</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <header class="page-header">
      <h1>Analyze Legal Document</h1>
      <p class="subtitle">Upload a PDF file to extract and classify entities</p>
    </header>

    <section class="analyze-section">
      <div class="upload-container">
        <div class="upload-box" id="uploadBox">
          <div class="upload-icon">📄</div>
          <h3>Upload PDF Document</h3>
          <p>Drag and drop your PDF file here, or click to browse</p>
          <input type="file" id="pdfInput" accept=".pdf,.txt" hidden />
          <button class="btn-secondary" id="chooseFileBtn">Choose File</button>
          <p class="file-info" id="fileInfo"></p>
        </div>

        <div class="analyze-controls">
          <button id="analyzeBtn" class="btn-primary btn-large" disabled>
            Analyze Document
          </button>
          <button id="clearBtn" class="btn-secondary">Clear</button>
        </div>
      </div>

      <div class="output-container" id="outputContainer" style="display:none;">
        <h2>Extraction Results</h2>

        <div class="results-summary" id="resultsSummary"></div>

        <div class="output-box" id="outputBox">
          <p class="placeholder">Results will appear here...</p>
        </div>
      </div>

      <div class="loading-overlay" id="loadingOverlay" style="display:none;">
        <div class="loading-spinner"></div>
        <p>Analyzing document... This may take a few moments.</p>
      </div>
    </section>
  </div>

<script>
/* =========================
   DOM REFERENCES
========================= */
const pdfInput = document.getElementById('pdfInput');
const chooseFileBtn = document.getElementById('chooseFileBtn');
const analyzeBtn = document.getElementById('analyzeBtn');
const clearBtn = document.getElementById('clearBtn');
const fileInfo = document.getElementById('fileInfo');
const outputContainer = document.getElementById('outputContainer');
const outputBox = document.getElementById('outputBox');
const resultsSummary = document.getElementById('resultsSummary');
const loadingOverlay = document.getElementById('loadingOverlay');
const uploadBox = document.getElementById('uploadBox');

/* =========================
   STATE
========================= */
let selectedFile = null;
let allClauses = [];
let showingAll = false;

/* =========================
   VIEW MORE BUTTON (DYNAMIC)
========================= */
/* =========================
   VIEW MORE BUTTON SETUP
========================= */
const viewMoreWrapper = document.createElement('div');
viewMoreWrapper.className = 'view-more-wrapper';

const viewMoreBtn = document.createElement('button');
viewMoreBtn.id = 'viewMoreBtn';
viewMoreBtn.className = 'btn-secondary';
viewMoreBtn.textContent = 'View more clauses';

viewMoreWrapper.appendChild(viewMoreBtn);

/* =========================
   FILE HANDLING
========================= */
chooseFileBtn.onclick = () => pdfInput.click();

pdfInput.onchange = () => {
  if (pdfInput.files[0]) {
    selectedFile = pdfInput.files[0];
    fileInfo.textContent = `Selected: ${selectedFile.name}`;
    analyzeBtn.disabled = false;
  }
};

clearBtn.onclick = () => {
  selectedFile = null;
  pdfInput.value = '';
  fileInfo.textContent = '';
  analyzeBtn.disabled = true;
  outputContainer.style.display = 'none';
  outputBox.innerHTML = '<p class="placeholder">Results will appear here...</p>';
  resultsSummary.innerHTML = '';
  allClauses = [];
  showingAll = false;
};

/* =========================
   ANALYZE
========================= */
analyzeBtn.onclick = async () => {
  if (!selectedFile) return;

  const formData = new FormData();
  formData.append('file', selectedFile);

  loadingOverlay.style.display = 'flex';

  const res = await fetch('/api/analyze', { method: 'POST', body: formData });
  const result = await res.json();

  loadingOverlay.style.display = 'none';

  if (!result.success) return alert('Analysis failed');

  outputContainer.style.display = 'block';
  renderResults(result.data);
};

/* =========================
   RENDER RESULTS
========================= */
function renderResults(data) {
  const summary = data.contract_analysis.summary_statistics;

  resultsSummary.innerHTML = `
    <div>Total clauses: ${summary.total_clauses}</div>
    <div>Clauses with labels: ${summary.clauses_with_labels}</div>
    <div>Total entities: ${summary.total_entities}</div>
    <div>High importance clauses: ${summary.high_importance_clauses}</div>
  `;

  allClauses = (data.contract_analysis.all_clauses || [])
  .filter(c => c.predicted_labels?.length);

   

  showingAll = false;
  renderClauseList(showingAll);
}

/* =========================
   RENDER CLAUSES
========================= */
function renderClauseList(showAll = false) {
  if (!allClauses.length) {
    outputBox.innerHTML = '<p class="placeholder">No important clauses found.</p>';
    return;
  }

  const clausesToShow = showAll ? allClauses : allClauses.slice(0, 10);
  let html = '';

  clausesToShow.forEach((c, index) => {
    const clauseNumber =
      typeof c.clause_id === 'number' ? c.clause_id + 1 : index + 1;

    const firstLabelObj = c.predicted_labels?.[0];
    const mainLabel = firstLabelObj
      ? firstLabelObj.label.replace(/-Answer$/i, '')
      : 'Unknown';

    const prob = firstLabelObj
      ? firstLabelObj.score.toFixed(2)
      : '0.00';

    let entitiesHtml = '';

    if (c.entities?.length) {
      entitiesHtml = '<div style="margin-top:12px;"><strong>Entities:</strong></div>';

      c.entities.slice(0, 10).forEach(entity => {
        const label = (entity.label || entity.type || 'unknown').toLowerCase();
        const text = entity.text || entity.entity || '';

        entitiesHtml += `
          <div class="entity-item ${label}">
            <span class="entity-label ${label}">${label.toUpperCase()}</span>
            <span class="entity-text">${escapeHtml(text)}</span>
          </div>
        `;
      });
    } else {
      entitiesHtml =
        '<div style="margin-top:12px;"><strong>Entities:</strong> None detected</div>';
    }

    html += `
      <div class="entity-item legal">
        <div class="entity-label legal">
          Clause #${clauseNumber} (Score: ${c.importance_score.toFixed(2)})
        </div>
        <div class="entity-text">
          ${escapeHtml(c.text).slice(0, 120)}...
        </div>
        <div style="margin-top:8px;font-weight:600;color:var(--primary-color);">
          Clause type: ${escapeHtml(mainLabel)} (${prob})
        </div>
        ${entitiesHtml}
      </div>
    `;
  });

  outputBox.innerHTML = html;

  
    outputBox.appendChild(viewMoreWrapper);
  

  viewMoreBtn.textContent = showAll
    ? 'View top 10 clauses'
    : 'View more clauses';
}

/* =========================
   TOGGLE (FIXED)
========================= */
viewMoreBtn.onclick = () => {
  showingAll = !showingAll;
  renderClauseList(showingAll); // ✅ THIS WAS THE MAIN BUG
};

/* =========================
   UTILS (SAFE)
========================= */
function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>"']/g, m =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m])
  );
}
</script>
</body>
</html>
